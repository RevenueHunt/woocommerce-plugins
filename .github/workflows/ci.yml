name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      # --- Quality gates (block merge on red) ---

      - name: Coding standards (WPCS, baselined)
        # phpcs.baseline.xml grandfathers pre-existing V1 findings; new/changed
        # code must pass clean. See phpcs.xml.dist.
        run: composer lint

      - name: Static analysis (PHPStan, baselined)
        # phpstan-baseline.neon grandfathers pre-existing V1 findings; new code
        # must analyse clean. See phpstan.neon.dist.
        run: composer analyse

      - name: Characterization suite (must be green before AND after every change)
        run: composer test

      # --- Build + integrity ---

      - name: Build both artifacts
        run: php tools/build.php all

      - name: Build-diff guard (one source -> two artifacts)
        run: bash tools/verify-build.sh

  # wp.org submission readiness. Isolated in its own job so the official action
  # owns a clean wp-env/Docker environment (it sets up Node 24 + wp-env start +
  # runs the check via wp-cli). Informational for now: Plugin Check has no
  # baseline mechanism, so job-level continue-on-error keeps overall CI green
  # while legacy V1 findings are triaged. Remove continue-on-error to make it a
  # hard gate once those are addressed.
  plugin-check:
    name: WordPress Plugin Check (informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer
          coverage: none

      - name: Build free artifact
        run: php tools/build.php all

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Start wp-env (built plugin + Plugin Check)
        # Self-managed wp-env (vs the official action, whose wp-env start no-op'd):
        # explicit config + a readiness probe make provisioning and errors visible.
        run: |
          npm -g --no-fund install @wordpress/env
          cat > .wp-env.json <<'JSON'
          {
            "plugins": [
              "./build/product-recommendation-quiz-for-ecommerce",
              "https://downloads.wordpress.org/plugin/plugin-check.latest-stable.zip"
            ],
            "testsEnvironment": false
          }
          JSON
          wp-env start
          wp-env run cli wp core version

      - name: Run Plugin Check
        run: |
          wp-env run cli wp plugin activate product-recommendation-quiz-for-ecommerce
          wp-env run cli wp plugin check product-recommendation-quiz-for-ecommerce
