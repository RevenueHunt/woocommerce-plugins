name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      # --- Quality gates (block merge on red) ---

      - name: Coding standards (WPCS, baselined)
        # phpcs.baseline.xml grandfathers pre-existing V1 findings; new/changed
        # code must pass clean. See phpcs.xml.dist.
        run: composer lint

      - name: Static analysis (PHPStan, baselined)
        # phpstan-baseline.neon grandfathers pre-existing V1 findings; new code
        # must analyse clean. See phpstan.neon.dist.
        run: composer analyse

      - name: Characterization suite (must be green before AND after every change)
        run: composer test

      # --- Build + integrity ---

      - name: Build both artifacts
        run: php tools/build.php all

      - name: Build-diff guard (one source -> two artifacts)
        run: bash tools/verify-build.sh

  # wp.org submission readiness. Self-managed wp-env (the official action's
  # wp-env start no-op'd). Blocking on ERROR-severity findings only; WARNING
  # findings are reported but deferred (Plugin Check has no baseline mechanism).
  plugin-check:
    name: WordPress Plugin Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer
          coverage: none

      - name: Build free artifact
        run: php tools/build.php all

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Start wp-env (built plugin + Plugin Check)
        # Self-managed wp-env (vs the official action, whose wp-env start no-op'd):
        # explicit config + a readiness probe make provisioning and errors visible.
        run: |
          npm -g --no-fund install @wordpress/env
          cat > .wp-env.json <<'JSON'
          {
            "plugins": [
              "./build/product-recommendation-quiz-for-ecommerce",
              "https://downloads.wordpress.org/plugin/plugin-check.latest-stable.zip"
            ],
            "testsEnvironment": false
          }
          JSON
          wp-env start
          wp-env run cli wp core version

      - name: Run Plugin Check (errors block; warnings reported)
        run: |
          wp-env run cli wp plugin activate product-recommendation-quiz-for-ecommerce
          # Full human-readable report (warnings included) for visibility.
          wp-env run cli wp plugin check product-recommendation-quiz-for-ecommerce || true
          # Gate on ERROR-severity findings only; warnings are deferred.
          wp-env run cli wp plugin check product-recommendation-quiz-for-ecommerce --format=json 2>/dev/null > pc.json || true
          # wp plugin check emits one JSON array per file; slurp + merge them, then
          # count ERROR-severity rows.
          ERRORS=$(jq -s 'map(select(type=="array")) | add // [] | map(select(.type=="ERROR")) | length' pc.json 2>/dev/null || echo "")
          if [ -z "$ERRORS" ]; then
            echo "::error::Could not parse Plugin Check JSON output:"; cat pc.json; exit 1
          fi
          echo "Plugin Check ERROR-severity findings: $ERRORS"
          test "$ERRORS" -eq 0
